name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - run: npm ci

      - run: npm ci --prefix functions

      - run: npx playwright install --with-deps chromium webkit

      - run: npm run typecheck
      - run: npm run lint

      - run: npm run test -- --coverage

      - run: npm --prefix functions test

      - run: npm run test:functions:emulator

      - run: npm run test:rules

      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ALLOWED_EMAIL: ${{ secrets.VITE_ALLOWED_EMAIL }}
          VITE_ALLOWED_EMAILS: ${{ secrets.VITE_ALLOWED_EMAILS }}

      - run: npm run check:bundle-budget

      - run: npm run build
        working-directory: functions

      - run: npm run e2e:mock
        env:
          CI: 'true'
          VITE_E2E_MODE: 'true'

      - run: npm run e2e:webkit
        env:
          CI: 'true'
          VITE_E2E_MODE: 'true'

      - run: npm run e2e:emulator
        env:
          CI: 'true'
          VITE_FIREBASE_API_KEY: fake-api-key
          VITE_FIREBASE_AUTH_DOMAIN: localhost
          VITE_FIREBASE_PROJECT_ID: fittracker-workouts
          VITE_FIREBASE_STORAGE_BUCKET: fittracker-workouts.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '1234567890'
          VITE_FIREBASE_APP_ID: '1:1234567890:web:e2e'

  ios-simulator-smoke:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run preflight:ios-release && npm run build:mobile && npx cap sync ios
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_REVENUECAT_APPLE_API_KEY: ${{ secrets.VITE_REVENUECAT_APPLE_API_KEY }}

      - run: npm run ios:simulator:smoke

  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: [quality, ios-simulator-smoke]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_ALLOWED_EMAIL: ${{ secrets.VITE_ALLOWED_EMAIL }}
          VITE_ALLOWED_EMAILS: ${{ secrets.VITE_ALLOWED_EMAILS }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4

  firebase-contract-deploy:
    if: vars.ENABLE_FIREBASE_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: production
    needs: [quality]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm ci --prefix functions
      - run: npm --prefix functions run typecheck
      - run: npm --prefix functions test
      - run: npm --prefix functions run build
      - run: |
          shasum -a 256 firestore.rules firestore.indexes.json storage.rules > firebase-contract-revision.sha256
          find functions/lib -type f -name '*.js' -print0 | sort -z | xargs -0 shasum -a 256 >> firebase-contract-revision.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: firebase-contract-revision-${{ github.sha }}
          path: firebase-contract-revision.sha256
      - run: npx firebase-tools deploy --only functions,firestore:rules,firestore:indexes,storage --project "${{ vars.FIREBASE_PROJECT_ID }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
