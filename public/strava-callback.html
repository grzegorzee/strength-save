<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strava - Łączenie...</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #333;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e5e5;
      border-top-color: #FC4C02;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Przekierowuję...</p>
  </div>
  <script>
    // Bridge: Strava OAuth redirects here (plain URL), then we redirect to HashRouter route
    const params = window.location.search;
    const basePath = window.location.pathname.replace('/strava-callback.html', '');
    window.location.replace(basePath + '/#/strava/callback' + params);
  </script>
</body>
</html>
